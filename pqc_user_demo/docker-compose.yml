services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pqc-backend
    restart: unless-stopped
    environment:
      PORT: "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - pqc-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pqc-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pqc-net

networks:
  pqc-net:
    driver: bridge
